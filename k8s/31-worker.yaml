apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: flowforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: flowforge-worker:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "tr '\\0' ' ' </proc/1/cmdline | grep -q FlowForge.Worker.dll"
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__WorkerDb
              value: "Host=postgres;Port=5432;Database=worker_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: Kafka__BootstrapServers
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: KAFKA_BOOTSTRAP_SERVERS
