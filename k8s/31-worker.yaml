apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: flowforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: flowforge-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__WorkerDb
              value: "Host=postgres;Port=5432;Database=worker_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: Kafka__BootstrapServers
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: KAFKA_BOOTSTRAP_SERVERS
