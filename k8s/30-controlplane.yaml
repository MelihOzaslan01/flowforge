apiVersion: v1
kind: Service
metadata:
  name: controlplane
  namespace: flowforge
spec:
  selector:
    app: controlplane
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  namespace: flowforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controlplane
  template:
    metadata:
      labels:
        app: controlplane
    spec:
      containers:
        - name: controlplane
          image: flowforge-controlplane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: ASPNETCORE_URLS
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__ControlDb
              value: "Host=postgres;Port=5432;Database=control_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: ConnectionStrings__WorkerDb
              value: "Host=postgres;Port=5432;Database=worker_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: Kafka__BootstrapServers
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: KAFKA_BOOTSTRAP_SERVERS
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: controlplane
  namespace: flowforge
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: controlplane
                port:
                  number: 80
